          : \"\"\n        }\n\n    def clean_text(value):\n        value = str(value
          or \"\").strip()\n        if value.lower() in {\"none\", \"null\", \"undefined\"\
          , \"n/a\", \"na\"}:\n            return \"\"\n        return value\n\n \
          \   data = defaults()\n    text = raw or \"\"\n    try:\n        m = re.search(r\"\
          \\{[\\s\\S]*\\}\", text)\n        obj = json.loads(m.group(0) if m else
          text)\n        if isinstance(obj, dict):\n            data.update(obj)\n\
          \    except Exception as exc:\n        data[\"reason\"] = \"write action
          JSON parse failed: \" + str(exc)\n\n    if data[\"mode\"] not in {\"none\"\
          , \"preview\", \"execute\"}: data[\"mode\"] = \"none\"\n    if data[\"family\"\
          ] not in {\"none\", \"album\", \"tag\"}: data[\"family\"] = \"none\"\n \
          \   if data[\"albumAction\"] not in {\"create_album\", \"create_album_and_add_files\"\
          , \"add_files_to_album\", \"remove_files_from_album\"}: data[\"albumAction\"\
          ] = \"\"\n    if data[\"tagAction\"] not in {\"add_tags\", \"remove_tags\"\
          }: data[\"tagAction\"] = \"\"\n\n    file_ids = data.get(\"fileIds\") or
          []\n    if isinstance(file_ids, str): file_ids = re.findall(r\"[0-9a-fA-F]{32}\"\
          , file_ids)\n    if not isinstance(file_ids, list): file_ids = []\n    clean_ids,
          seen = [], set()\n    for item in file_ids:\n        value = clean_text(item)\n\
          \        if value and value not in seen:\n            seen.add(value); clean_ids.append(value)\n\
          \        if len(clean_ids) >= 100: break\n    data[\"fileIds\"] = clean_ids\n\
          \n    for key in [\"albumId\", \"sourceAlbumId\"]:\n        try: data[key]
          = int(data.get(key) or -1)\n        except Exception: data[key] = -1\n\n\
          \    for key in [\"albumName\", \"tagName\", \"imageType\", \"imageTypeText\"\
          , \"searchType\", \"searchKeyword\", \"mediaType\", \"sourceTagName\", \"\
          locationLevel\", \"locationValue\", \"reason\"]:\n        data[key] = clean_text(data.get(key))\n\
          \n    query = re.sub(r\"[\\s，,。.!！?？;；:：]+\", \"\", clean_text(current_query)).lower()\n\
          \    exact_confirmations = {\"确认\", \"执行\", \"确认执行\", \"开始执行\", \"可以执行\", \"同意执行\", \"confirm\", \"execute\"}\n\
          \    if data[\"mode\"] == \"execute\" and query not in exact_confirmations:\n\
          \        data[\"mode\"] = \"preview\"\n\n    if not data[\"imageType\"]: data[\"imageType\"] = \"other\"\n    if
          data[\"imageTypeText\"] not in {\"picture\", \"gif\", \"video\", \"all\"\
          }: data[\"imageTypeText\"] = \"picture\"\n    if data[\"searchType\"] not
