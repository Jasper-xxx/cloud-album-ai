route:
  receiver: default
  group_by:
    - alertname
    - service
    - component
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: production-webhook
      matchers:
        - environment=~"prod|production"

receivers:
  - name: default
  - name: production-webhook
    webhook_configs:
      - url: http://alert-receiver:8080/alertmanager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - alertname="MemoryBackendMetricsTargetDown"
    target_matchers:
      - service="memory-backend"
    equal:
      - instance
